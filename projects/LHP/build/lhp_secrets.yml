services:
  code-db-ords-deploy:
    secrets:
      - lhp_user
      - lhp_pwd
      - lhp_app_user
      - lhp_app_pwd
      - lhp_apx_user
      - lhp_apx_pwd
secrets:
  lhp_user:
    name: ${COMPOSE_PROJECT_NAME}_lhp_user
    external: true
  lhp_pwd:
    name: ${COMPOSE_PROJECT_NAME}_lhp_pwd
    external: true
  lhp_app_user:
    name: ${COMPOSE_PROJECT_NAME}_lhp_app_user
    external: true
  lhp_app_pwd:
    name: ${COMPOSE_PROJECT_NAME}_lhp_app_pwd
    external: true
  lhp_apx_user:
    name: ${COMPOSE_PROJECT_NAME}_lhp_apx_user
    external: true
  lhp_apx_pwd:
    name: ${COMPOSE_PROJECT_NAME}_lhp_apx_pwd
    external: true
