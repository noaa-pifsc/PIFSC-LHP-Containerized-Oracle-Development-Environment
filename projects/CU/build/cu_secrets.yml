services:
  code-db-ords-deploy:
    secrets:
      - cen_utils_db_username_secret
      - cen_utils_db_password_secret
secrets:
  cen_utils_db_username_secret:
    name: ${COMPOSE_PROJECT_NAME}_cen_utils_db_username_secret
    external: true
  cen_utils_db_password_secret:
    name: ${COMPOSE_PROJECT_NAME}_cen_utils_db_password_secret
    external: true