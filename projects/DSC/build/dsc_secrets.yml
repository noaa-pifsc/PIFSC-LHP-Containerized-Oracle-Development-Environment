services:
  code-db-ords-deploy:
    secrets:
      - dsc_user
      - dsc_pwd
volumes:
  # Defines the new shared volume for the APEX static application files
  code-apex-static-vol:
    external: false
networks: 
  oracle-net:
secrets:
  dsc_pwd:
    name: ${COMPOSE_PROJECT_NAME}_dsc_pwd
    external: true
  dsc_user:
    name: ${COMPOSE_PROJECT_NAME}_dsc_user
    external: true
