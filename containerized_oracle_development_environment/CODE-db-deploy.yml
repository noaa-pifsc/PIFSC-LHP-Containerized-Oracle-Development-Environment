services:
  code-db:
    image: ${DB_IMAGE}
    ports: 
      - target: ${DBPORT}
        published: ${DB_HOST_PORT}
        protocol: tcp
        mode: host
    hostname: ${DBHOST}
    networks:
      - oracle-net
    secrets:
      - oracle_pwd
    deploy:
      replicas: 1 
      restart_policy:
        condition: on-failure 
        delay: 15s             # Wait 15 seconds before trying again to avoid log spam
        max_attempts: 30       # Allow up to 30 attempts
        window: 600s           # Extend the failure window to 10 minutes
  code-db-ords-deploy:
    image: pifsc/code-db-ords-deploy:latest
    build:
      context: ..
      dockerfile: containerized_oracle_development_environment/Dockerfile.deploy
    networks:
      - oracle-net
    volumes:
      # Mounts the shared volume as a folder inside this container
      # so the script can write the static files to it.
      - code-apex-static-vol:/apex-static
    environment:
      - TARGET_APEX_VERSION=${TARGET_APEX_VERSION}
      - ORACLE_PWD_FILE=/run/secrets/oracle_pwd
      - DBHOST=${DBHOST}
      - DBPORT=${DBPORT}
      - DBSERVICENAME=${DBSERVICENAME}
      - APP_SCHEMA_NAME=${APP_SCHEMA_NAME}
      - ORDS_ENABLED=${ORDS_ENABLED}
    secrets:
      - oracle_pwd
    deploy:
      replicas: 1 
      restart_policy:
        condition: none 
volumes:
  # Defines the new shared volume for the APEX static application files
  code-apex-static-vol:
    external: false
networks: 
  oracle-net:
secrets:
  oracle_pwd:
    name: ${COMPOSE_PROJECT_NAME}_oracle_pwd
    external: true
