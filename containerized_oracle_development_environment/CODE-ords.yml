services:
  code-ords:
    container_name: code-ords
    restart: always
    depends_on:
      # Wait for the deploy container to finish to
      # ensure the static files are in place before ORDS starts.
      code-db-ords-deploy:
        condition: service_completed_successfully
    networks:
      - oracle-net
    build:
      context: .
      dockerfile: Dockerfile.ords
      args:
        ORDS_IMAGE: ${ORDS_IMAGE}
    volumes:
      # define a new named volume for the ORDS configuration folder
      - ords-config-vol:/etc/ords/config
      # This points to the new shared Docker volume to allow the apex installation/upgrade to be handled by a separate container
      - code-apex-static-vol:/opt/oracle/ords/static
    ports:
      - ${ORDS_HOST_PORT}:8080
    image: ${ORDS_IMAGE}
    # These variables tell ORDS how to connect to the DB
    # to create its configuration on the first run.
    environment:
      - DBHOST=${DBHOST}
      - DBPORT=${DBPORT}
      - DBSERVICENAME=${DBSERVICENAME}
      # SYS password defined in .env file
      - ORACLE_PWD=${ORACLE_PWD}
      # set the password for the ODS_PUBLIC_USER database account to be the same as the SYS password defined in .env file
      - ORDS_PWD=${ORACLE_PWD}
volumes:
  # Defines the new shared volume for the APEX static application files
  code-apex-static-vol:
    name: code-apex-static-vol
    external: false
  code-ords-config-vol:
    name: code-ords-config-vol
    external: false
networks: 
  oracle-net:
    driver: bridge